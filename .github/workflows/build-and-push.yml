# This is the GitHub Actions workflow file to build and push Docker container

name: Build and Push Docker Container

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build . -t ghcr.io/GitJunglist/comfyuiTail:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ghcr.io/GitJunglist/comfyuiTail:${{ github.sha }}
